name: Build
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/src/main/assets
          destination_dir: pwa
      - run: echo "APK build skipped - use PWA at https://blcx6969.github.io/AI-Agent-Hub/"