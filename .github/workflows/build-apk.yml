name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build APK
        run: gradle assembleRelease

      - name: Upload APK to Release
        run: |
          gh release upload v1.1.0 app/build/outputs/apk/release/*.apk --clobber || \
          gh release create v1.1.0 app/build/outputs/apk/release/*.apk --title "????AI v1.1" --notes ""
        env:
          GH_TOKEN: ${{ github.token }}
