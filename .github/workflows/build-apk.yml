name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build Debug APK (signed)
        run: gradle assembleDebug

      - name: Delete old release
        run: |
          gh release delete v1.1.0 --yes || true
          git tag -d v1.1.0 || true
          git push origin :refs/tags/v1.1.0 || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release and upload APK
        run: |
          cp app/build/outputs/apk/debug/*.apk ????AI???.apk
          gh release create v1.1.0 ????AI???.apk --title "????AI v1.1" --notes "???????????????"
        env:
          GH_TOKEN: ${{ github.token }}
